{% load static %}

<aside class="cab-sidebar">
    <div class="cab-profile">
        <div class="cab-profile__header">
            <div class="cab-profile__avatar">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#e3000f" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <div class="cab-profile__info">
                <span class="cab-profile__name" style="color:#e3000f; cursor:default;">Адміністратор</span>
                <span class="cab-profile__meta">{{ user.username }} &middot; ID {{ user.id }}</span>
            </div>
        </div>
    </div>

    <nav class="cab-nav">
        <a href="#" class="cab-nav__item cab-nav__item--active" onclick="switchAdminTab(event,'users')" data-tab="users">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
            <span>Користувачі</span>
            <span class="cab-nav__new" style="background:#3b7bbf">{{ all_users|length }}</span>
        </a>
        <a href="#" class="cab-nav__item" onclick="switchAdminTab(event,'listings')" data-tab="listings">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="7" y1="8" x2="17" y2="8"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="7" y1="16" x2="13" y2="16"/></svg>
            <span>Оголошення</span>
            <span class="cab-nav__new" style="background:#3b7bbf">{{ all_cars|length }}</span>
        </a>

        <div class="cab-nav__separator"></div>

        <a href="{% url 'cabinet' %}" class="cab-nav__item">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Мій кабінет</span>
        </a>
        <a href="{% url 'logout' %}" class="cab-nav__item">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span>Вихід</span>
        </a>
    </nav>
</aside>
