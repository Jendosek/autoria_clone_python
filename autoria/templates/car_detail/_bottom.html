<section class="similar">
    <h2 class="similar__title">Схожі оголошення</h2>
    <div class="similar__wrap">
        <button class="similar__arrow similar__arrow--left" onclick="similarPrev()" aria-label="Назад">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="similar__track" id="similarTrack">
            {% for s in similar_cars %}
            <a href="{% url 'car_detail' s.id %}" class="similar-card">
                <div class="similar-card__img-wrap">
                    <img src="{{ s.image_url }}" alt="{{ s.brand }} {{ s.model }}" class="similar-card__img">
                </div>
                <h3 class="similar-card__name">{{ s.brand }} {{ s.model }} {{ s.year }}</h3>
                <p class="similar-card__gen">{{ s.generation }} &middot; {{ s.modification }}</p>
                <span class="similar-card__price">{{ s.price|floatformat:0 }} $</span>
            </a>
            {% endfor %}
        </div>
        <button class="similar__arrow similar__arrow--right" onclick="similarNext()" aria-label="Вперед">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 6 15 12 9 18"/></svg>
        </button>
    </div>
</section>
